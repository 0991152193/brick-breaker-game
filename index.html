<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 核心适配：让页面跟随设备宽度，禁止缩放 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多关卡打砖块小游戏 - 小球加速版</title>
    <meta name="description" content="一款解压打砖块小游戏，小球撞砖块后速度递增，多关卡挑战，支持鼠标/触摸控制！">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* 禁止触摸缩放，提升触摸体验 */
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden; /* 隐藏页面滚动条 */
        }
        /* 游戏容器：自适应屏幕，最大宽度不超800px */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
        }
        /* 画布：自适应容器宽度，保持16:9的游戏比例 */
        #gameCanvas {
            width: 100%;
            height: auto;
            background-color: #000;
            border: 2px solid #fff;
            display: block; /* 消除画布底部空隙 */
        }
        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="game-info">
        <div>分数: <span id="score">0</span></div>
        <div>关卡: <span id="level">1</span></div>
        <div>生命: <span id="lives">3</span></div>
    </div>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <button class="start-btn" id="startBtn">开始游戏</button>
    </div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const livesElement = document.getElementById('lives');

        // 游戏参数（自适应版本）
        let gameWidth, gameHeight;
        let paddleWidth, paddleHeight;
        let ballRadius;
        let brickRowCount, brickColumnCount;
        let brickWidth, brickHeight;
        let brickPadding, brickOffsetTop, brickOffsetLeft;

        // 初始化尺寸（适配不同屏幕）
        function initSize() {
            // 基于容器宽度计算游戏尺寸，保持16:9比例
            const containerWidth = document.getElementById('game-container').clientWidth;
            gameWidth = containerWidth - 20; // 减去内边距
            gameHeight = gameWidth * 0.75; // 4:3比例，更适合打砖块

            // 设置画布实际尺寸（解决模糊+适配）
            canvas.width = gameWidth;
            canvas.height = gameHeight;

            // 适配元素尺寸
            paddleWidth = gameWidth * 0.15; // 球拍宽度=画布15%
            paddleHeight = gameHeight * 0.02; // 球拍高度=画布2%
            ballRadius = gameHeight * 0.015; // 小球半径=画布1.5%

            // 砖块参数适配
            brickRowCount = 5;
            brickColumnCount = Math.floor(gameWidth / 60);
            brickWidth = (gameWidth - (brickColumnCount + 1) * 10) / brickColumnCount;
            brickHeight = gameHeight * 0.03;
            brickPadding = 10;
            brickOffsetTop = gameHeight * 0.1;
            brickOffsetLeft = 10;
        }

        // 游戏状态
        let score = 0;
        let level = 1;
        let lives = 3;
        let gameRunning = false;

        // 球拍位置
        let paddleX = 0;

        // 小球位置和速度
        let x = 0, y = 0;
        let dx = 0, dy = 0;
        let baseSpeed = 4; // 基础速度

        // 砖块数组
        let bricks = [];

        // 初始化砖块
        function initBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        // 重置游戏（保留分数和关卡）
        function resetGame() {
            // 球拍初始位置（居中）
            paddleX = (gameWidth - paddleWidth) / 2;

            // 小球初始位置和速度
            x = gameWidth / 2;
            y = gameHeight - paddleHeight - ballRadius - 10;
            dx = baseSpeed * (Math.random() > 0.5 ? 1 : -1);
            dy = -baseSpeed;

            // 隐藏开始按钮
            startBtn.style.display = 'none';
            gameRunning = true;
        }

        // 开始新关卡
        function startNewLevel() {
            level++;
            levelElement.textContent = level;
            baseSpeed *= 1.1; // 每关速度提升10%
            paddleWidth *= 0.9; // 每关球拍缩小10%
            initBricks();
            resetGame();
        }

        // 绘制球拍
        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, gameHeight - paddleHeight, paddleWidth, paddleHeight);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.closePath();
        }

        // 绘制小球
        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.closePath();
        }

        // 绘制砖块
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        // 不同行不同颜色
                        const hue = (r * 30) % 360;
                        ctx.fillStyle = `hsl(${hue}, 80%, 50%)`;
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        // 碰撞检测
        function collisionDetection() {
            // 砖块碰撞
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                            score += 10;
                            scoreElement.textContent = score;

                            // 小球加速（每次撞砖块提升5%速度）
                            dx *= 1.05;
                            dy *= 1.05;

                            // 检查是否通关
                            let isLevelComplete = true;
                            for (let cc = 0; cc < brickColumnCount; cc++) {
                                for (let rr = 0; rr < brickRowCount; rr++) {
                                    if (bricks[cc][rr].status === 1) {
                                        isLevelComplete = false;
                                        break;
                                    }
                                }
                                if (!isLevelComplete) break;
                            }
                            if (isLevelComplete) {
                                setTimeout(() => {
                                    alert(`恭喜！通关第${level}关！`);
                                    startNewLevel();
                                }, 100);
                            }
                        }
                    }
                }
            }

            // 墙壁碰撞（左右）
            if (x + dx > gameWidth - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }

            // 墙壁碰撞（上）
            if (y + dy < ballRadius) {
                dy = -dy;
            }

            // 球拍碰撞
            if (y + dy > gameHeight - paddleHeight - ballRadius) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    // 增加角度变化，让反弹更灵活
                    const collisionPoint = (x - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
                    dx = collisionPoint * baseSpeed * 1.5;
                    dy = -Math.sqrt(Math.pow(baseSpeed * 2, 2) - Math.pow(dx, 2));
                }
            }

            // 小球出界（下）
            if (y + dy > gameHeight + ballRadius) {
                lives--;
                livesElement.textContent = lives;
                if (lives > 0) {
                    resetGame();
                } else {
                    // 游戏结束
                    gameRunning = false;
                    startBtn.style.display = 'block';
                    startBtn.textContent = '游戏结束，重新开始';
                    alert(`游戏结束！最终分数：${score}，关卡：${level}`);
                    // 重置所有参数
                    score = 0;
                    level = 1;
                    lives = 3;
                    baseSpeed = 4;
                    scoreElement.textContent = score;
                    levelElement.textContent = level;
                    livesElement.textContent = lives;
                    initSize(); // 重新适配尺寸
                    initBricks();
                }
            }
        }

        // 绘制游戏
        function draw() {
            if (!gameRunning) return;
            
            // 清空画布
            ctx.clearRect(0, 0, gameWidth, gameHeight);
            
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // 更新小球位置
            x += dx;
            y += dy;

            // 限制球拍在画布内
            if (paddleX < 0) {
                paddleX = 0;
            }
            if (paddleX > gameWidth - paddleWidth) {
                paddleX = gameWidth - paddleWidth;
            }

            requestAnimationFrame(draw);
        }

        // 鼠标控制
        document.addEventListener('mousemove', (e) => {
            if (!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            paddleX = e.clientX - rect.left - paddleWidth / 2;
        });

        // 触摸控制（适配手机）
        document.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            e.preventDefault(); // 禁止页面滚动
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            paddleX = touchX - paddleWidth / 2;
        }, { passive: false });

        // 开始游戏按钮
        startBtn.addEventListener('click', () => {
            initSize(); // 确保尺寸正确
            initBricks();
            resetGame();
            draw();
        });

        // 窗口大小变化时重新适配
        window.addEventListener('resize', () => {
            initSize();
            if (gameRunning) {
                resetGame();
            }
        });

        // 初始化
        initSize();
        initBricks();
    </script>
</body>
</html>
